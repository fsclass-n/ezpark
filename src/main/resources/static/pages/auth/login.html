<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - ezpark</title>
  <meta name="description" content="ezpark 스마트 주차관제 플랫폼에 로그인하세요." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard Variable', 'Noto Sans KR', sans-serif;
      min-height: 100vh; display: flex;
      background: #0a0e1a;
    }
    /* ── LEFT PANEL ── */
    .left-panel {
      width: 55%; position: relative; overflow: hidden;
      background: linear-gradient(145deg, #0d1b35, #0a0e1a);
      display: flex; align-items: center; justify-content: center;
    }
    .left-panel::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(13,110,253,0.22) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(25,135,84,0.15) 0%, transparent 50%);
    }
    .left-inner { position: relative; z-index: 1; padding: 60px; color: #fff; max-width: 500px; }
    .brand { font-size: 2rem; font-weight: 900; letter-spacing: 1px; margin-bottom: 40px; }
    .brand span { color: #6ea8fe; }
    .left-inner h2 { font-size: 2.2rem; font-weight: 800; line-height: 1.2; margin-bottom: 16px; }
    .left-inner h2 .hl {
      background: linear-gradient(90deg, #6ea8fe, #0dcaf0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .left-inner p { color: rgba(255,255,255,0.55); font-size: 0.98rem; line-height: 1.75; margin-bottom: 48px; }
    .feat-list { display: flex; flex-direction: column; gap: 14px; }
    .feat-item {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 14px 18px;
    }
    .feat-icon-sm {
      width: 40px; height: 40px; border-radius: 10px;
      background: rgba(13,110,253,0.2); color: #6ea8fe;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.15rem; flex-shrink: 0;
    }
    .feat-item span { font-size: 0.88rem; color: rgba(255,255,255,0.7); line-height: 1.4; }

    /* ── RIGHT PANEL ── */
    .right-panel {
      width: 45%; display: flex; align-items: center; justify-content: center;
      background: #fff; padding: 40px;
    }
    .login-box { width: 100%; max-width: 400px; }
    .login-box h3 { font-size: 1.7rem; font-weight: 800; color: #0f1923; margin-bottom: 6px; }
    .login-box .sub { font-size: 0.9rem; color: #6c757d; margin-bottom: 36px; }
    .form-label { font-weight: 600; font-size: 0.87rem; color: #0f1923; margin-bottom: 6px; }
    .form-control {
      border-radius: 10px; padding: 13px 16px;
      border: 1.5px solid #dee2e6; font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
      border-color: #0d6efd;
      box-shadow: 0 0 0 4px rgba(13,110,253,0.1);
    }
    .input-group .form-control { border-right: none; }
    .input-group .btn-toggle { border: 1.5px solid #dee2e6; border-left: none; border-radius: 0 10px 10px 0; background: #fff; color: #adb5bd; }
    .input-group .btn-toggle:focus { box-shadow: none; }
    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #0d6efd, #0dcaf0);
      border: none; border-radius: 12px; color: #fff;
      font-weight: 700; font-size: 1rem;
      box-shadow: 0 4px 16px rgba(13,110,253,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(13,110,253,0.45); }
    .btn-login:active { transform: scale(0.98); }
    .divider-or { text-align: center; color: #adb5bd; font-size: 0.85rem; margin: 20px 0; position: relative; }
    .divider-or::before, .divider-or::after {
      content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: #e9ecef;
    }
    .divider-or::before { left: 0; }
    .divider-or::after { right: 0; }
    .btn-social {
      width: 100%; padding: 12px; border-radius: 12px;
      border: 1.5px solid #dee2e6; background: #fff;
      font-size: 0.9rem; font-weight: 600; color: #495057;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-social:hover { background: #f8f9fa; border-color: #adb5bd; }
    .error-msg { display: none; color: #dc3545; font-size: 0.82rem; margin-top: 6px; }
    .error-msg.show { display: block; }
    .back-link { color: #6c757d; font-size: 0.88rem; text-decoration: none; }
    .back-link:hover { color: #0d6efd; }

    /* Responsive */
    @media (max-width: 768px) {
      .left-panel { display: none; }
      .right-panel { width: 100%; }
    }
  </style>
</head>
<body>

<!-- ── LEFT: BRAND PANEL ── -->
<div class="left-panel">
  <div class="left-inner">
    <div class="brand">ez<span>park</span></div>
    <h2>주차 관제의<br>새로운 기준, <span class="hl">AI가<br>만듭니다</span></h2>
    <p>실시간 영상 인지와 K-AI 빅데이터 분석으로<br>스마트 주차 경험을 제공합니다.</p>
    <div class="feat-list">
      <div class="feat-item">
        <div class="feat-icon-sm"><i class="bi bi-camera-video-fill"></i></div>
        <span>0.3초 이내 이동체 실시간 인지</span>
      </div>
      <div class="feat-item">
        <div class="feat-icon-sm"><i class="bi bi-graph-up-arrow"></i></div>
        <span>K-AI 연계 주차 수요 예측 리포트</span>
      </div>
      <div class="feat-item">
        <div class="feat-icon-sm"><i class="bi bi-map-fill"></i></div>
        <span>실시간 빈자리 안내 유도 맵</span>
      </div>
    </div>
  </div>
</div>

<!-- ── RIGHT: LOGIN FORM ── -->
<div class="right-panel">
  <div class="login-box">
    <a href="../../index.html" class="back-link d-flex align-items-center gap-1 mb-4">
      <i class="bi bi-arrow-left"></i> 홈으로
    </a>
    <h3>다시 오신 것을 환영합니다 👋</h3>
    <p class="sub">ezpark 계정으로 로그인하세요.</p>

    <form id="login-form" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label">이메일</label>
        <input type="email" class="form-control" id="email" placeholder="example@ezpark.kr" required />
        <div class="error-msg" id="email-err">올바른 이메일 주소를 입력해 주세요.</div>
      </div>
      <div class="mb-4">
        <div class="d-flex justify-content-between mb-1">
          <label for="password" class="form-label">비밀번호</label>
          <a href="#" class="text-primary" style="font-size:0.82rem;">비밀번호 찾기</a>
        </div>
        <div class="input-group">
          <input type="password" class="form-control" id="password" placeholder="비밀번호 입력" required />
          <button class="btn btn-toggle" type="button" id="pw-toggle" tabindex="-1">
            <i class="bi bi-eye" id="pw-icon"></i>
          </button>
        </div>
        <div class="error-msg" id="pw-err">비밀번호를 입력해 주세요.</div>
        <div class="error-msg" id="login-err">이메일 또는 비밀번호가 일치하지 않습니다.</div>
      </div>
      <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" id="remember" />
        <label class="form-check-label" for="remember" style="font-size:0.88rem; color:#6c757d;">로그인 상태 유지</label>
      </div>
      <button type="submit" class="btn-login">로그인</button>
    </form>

    <div class="divider-or">또는</div>

    <button class="btn-social mb-3">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-9 20-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.9C14.5 16.1 19 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.3C29.4 35.1 26.8 36 24 36c-5.2 0-9.7-3.5-11.3-8.4l-6.5 5C9.7 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.4-2.5 4.4-4.6 5.8l6.2 5.3C40.5 35.8 44 30.4 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
      Google로 계속하기
    </button>

    <p class="text-center mt-4" style="font-size:0.88rem; color:#6c757d;">
      계정이 없으신가요?
      <a href="register.html" class="text-primary fw-600" style="font-weight:600;">회원가입</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // 비밀번호 표시 토글
  document.getElementById('pw-toggle').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const icon = document.getElementById('pw-icon');
    const isHidden = pw.type === 'password';
    pw.type = isHidden ? 'text' : 'password';
    icon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
  });

  // 로그인 폼 처리 (더미: demo@ezpark.kr / 1234 로 로그인)
  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const emailErr = document.getElementById('email-err');
    const pwErr    = document.getElementById('pw-err');
    const loginErr = document.getElementById('login-err');

    let valid = true;
    emailErr.classList.remove('show');
    pwErr.classList.remove('show');
    loginErr.classList.remove('show');

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailErr.classList.add('show'); valid = false;
    }
    if (!password) {
      pwErr.classList.add('show'); valid = false;
    }
    if (!valid) return;

    // 데모 계정 체크 (2단계 백엔드 연동 전 임시)
    if (email === 'demo@ezpark.kr' && password === '1234') {
      sessionStorage.setItem('ez_logged_in', 'true');
      sessionStorage.setItem('ez_user', email);
      window.location.href = '../admin/dashboard.html';
    } else {
      loginErr.classList.add('show');
    }
  });
</script>
</body>
</html>
